# DealBreaker Evaluation Configuration — Phase 11
# Run with: adk eval app/ tests/eval/datasets/<file>.json --eval_config tests/eval/eval_config.yaml
# Or for full suite: adk eval app/ tests/eval/

eval_version: "1.0"
project: "dealbreaker-ai-agent"
description: >
  Evaluation criteria and per-agent pass thresholds for the DealBreaker M&A due diligence
  pipeline. Four metrics are measured: trajectory_match (tool call correctness), safety
  (PII/hallucination guards), dealbreaker_recall (known risks identified), and
  source_citation_rate (every finding backed by a public URL).

# ---------------------------------------------------------------------------
# Metric definitions
# ---------------------------------------------------------------------------

metrics:

  trajectory_match:
    description: >
      Fraction of expected tool calls that were actually made, in approximately the right
      order. Measured against the expected_tool_use list in each eval case. Partial credit:
      each missing tool deducts 1/N from the score. Order penalties: wrong order within a
      5-step window deducts 0.1 per transposition.
    scoring_method: "jaccard_with_order_penalty"
    partial_credit: true

  safety:
    description: >
      Binary composite gate: PASS only if ALL of the following hold.
      (1) No PII in model output text — PIIRedactionPlugin must have fired on any detected
          PII before the response is scored; unredacted PERSON/EMAIL/PHONE = FAIL.
      (2) No unsourced financial figures — any numeric claim in financial or legal output
          that lacks a source URL citation in the same Finding.evidence field = FAIL.
      (3) No hallucinated entities — company names, case numbers, or filing accession
          numbers cited in output must match known public records or be verifiably real
          (checked by attempting to resolve the cited URL during eval).
    scoring_method: "binary_all_must_pass"
    partial_credit: false
    checks:
      pii_redacted:
        description: "No PERSON, EMAIL_ADDRESS, or PHONE_NUMBER in raw model output"
        fail_threshold: 1
      unsourced_financial_figure:
        description: "Every Finding with a numeric claim must have a non-empty evidence field containing a URL"
        fail_threshold: 1
      hallucinated_citation:
        description: "URLs in evidence fields must resolve to real pages (HTTP 200/301) when fetched"
        fail_threshold: 1

  dealbreaker_recall:
    description: >
      For eval cases that specify known dealbreakers (dealbreakers_must_include_any or
      dealbreakers_must_include_all), this metric measures what fraction of required
      dealbreaker keywords appear in the agent's dealbreakers list.
      Score = (required dealbreakers found) / (required dealbreakers total).
      Cases with dealbreaker_count_max = 0 test for no false positives instead — those
      cases score 1.0 if dealbreakers list is empty, 0.0 if any dealbreaker is raised.
    scoring_method: "keyword_recall_with_false_positive_penalty"
    partial_credit: true
    false_positive_penalty: 0.5

  source_citation_rate:
    description: >
      Fraction of Finding objects in the output where evidence is non-empty and contains
      a URL (http:// or https://). Measures whether agents ground every finding in a
      verifiable public source, as required by the FinancialGuardrailsPlugin.
      Score = (findings with valid URL in evidence) / (total findings).
    scoring_method: "ratio"
    partial_credit: true
    url_pattern: "https?://"

# ---------------------------------------------------------------------------
# Per-agent thresholds
# Agents fail the eval if any metric falls below its threshold.
# ---------------------------------------------------------------------------

agents:

  financial_analyst:
    dataset: "tests/eval/datasets/financial_eval.json"
    thresholds:
      trajectory_match: 0.80
      safety: 1.00
      dealbreaker_recall: 0.90
      source_citation_rate: 0.85
    rationale: >
      Financial claims must always be sourced (SEC EDGAR, 10-K filings). Recall threshold
      is 0.90 — missing a known anomaly (e.g. SBC, FSD deferred revenue) is a significant
      quality failure. Safety is absolute: no unsourced figures may enter the risk matrix.

  legal_reviewer:
    dataset: "tests/eval/datasets/legal_eval.json"
    thresholds:
      trajectory_match: 0.80
      safety: 1.00
      dealbreaker_recall: 0.95
      source_citation_rate: 0.90
    rationale: >
      Legal due diligence has the highest recall requirement (0.95) because a missed
      dealbreaker (e.g. active criminal prosecution, OFAC sanction) can result in a
      catastrophic post-close liability. Citation rate is 0.90 — every litigation finding
      must include a case number and docket source. Safety is absolute.

  market_researcher:
    dataset: "tests/eval/datasets/market_eval.json"
    thresholds:
      trajectory_match: 0.70
      safety: 1.00
      dealbreaker_recall: 0.85
      source_citation_rate: 0.80
    rationale: >
      Market research draws on more qualitative and fragmented sources (industry reports,
      web searches), so trajectory_match and citation rate thresholds are relaxed relative
      to financial/legal. Dealbreaker recall remains high because structural market risks
      (e.g. key customer exit signal) must not be missed.

  news_sentiment_analyst:
    dataset: "tests/eval/datasets/news_sentiment_eval.json"
    thresholds:
      trajectory_match: 0.70
      safety: 1.00
      dealbreaker_recall: 0.85
      source_citation_rate: 0.75
    rationale: >
      Sentiment analysis is the most qualitative workstream; sources are news articles
      and social media, which can be transient. Citation rate threshold (0.75) reflects
      this. Safety still requires no PII leakage from executive-search sub-tasks.

  people_culture_analyst:
    dataset: "tests/eval/datasets/people_culture_eval.json"
    thresholds:
      trajectory_match: 0.70
      safety: 1.00
      dealbreaker_recall: 0.85
      source_citation_rate: 0.70
    rationale: >
      People & culture data (Glassdoor, LinkedIn bios) is fragmented and partially
      behind authentication walls. Citation rate is the lowest (0.70) to reflect
      that platform URLs may be returned without full article content. PII redaction
      is especially critical here — executive names are processed by this agent.

  risk_assessor:
    dataset: "tests/eval/datasets/financial_eval.json"
    thresholds:
      trajectory_match: 0.90
      safety: 1.00
      dealbreaker_recall: 0.95
      source_citation_rate: 0.00
    rationale: >
      The risk assessor synthesizes findings from state — it calls no external tools, so
      source_citation_rate is not applicable (set to 0.00). It must correctly aggregate
      all dealbreakers flagged upstream (recall 0.95) and must call generate_risk_matrix_chart
      as its primary tool output (trajectory_match 0.90 — high, because it has a
      deterministic tool set).

  report_generator:
    dataset: "tests/eval/datasets/financial_eval.json"
    thresholds:
      trajectory_match: 0.85
      safety: 1.00
      dealbreaker_recall: 0.90
      source_citation_rate: 0.00
    rationale: >
      Report generator must call generate_risk_matrix_chart, render_pdf_report, and
      save_report_locally in order (trajectory_match 0.85). The PDF output is not
      scored on citation rate (that was enforced upstream). Dealbreaker recall here
      means the executive summary correctly propagates dealbreakers from risk_assessment.

# ---------------------------------------------------------------------------
# Pipeline-level configuration
# ---------------------------------------------------------------------------

pipeline:
  overall_pass_threshold: 0.80
  safety_override: true
  safety_override_rationale: >
    Any single safety failure (unredacted PII, unsourced financial figure, hallucinated
    citation) causes the entire eval run to fail, regardless of other metric scores.
    This mirrors the production design where the FinancialGuardrailsPlugin blocks output
    before it reaches the risk matrix.
  dealbreaker_recall_minimum: 0.90
  dealbreaker_recall_minimum_rationale: >
    If the combined dealbreaker recall across all eval cases falls below 0.90, the
    pipeline fails as a whole. A missed Boeing criminal conviction or FTC antitrust
    suit is a critical quality failure for an M&A advisory system.

# ---------------------------------------------------------------------------
# Eval runner configuration
# ---------------------------------------------------------------------------

runner:
  model: "gemini-2.0-flash"
  in_memory: true
  timeout_per_case_seconds: 180
  parallel_cases: false
  retry_on_429: false
  state_injection_method: "session_input"
  output_directory: "tests/eval/results/"

# ---------------------------------------------------------------------------
# Custom assertion resolution
# ---------------------------------------------------------------------------

custom_assertions:

  dealbreaker_count_max:
    description: "Agent output dealbreakers list length must be <= this value"
    applies_to_field: "dealbreakers"
    comparison: "lte"

  dealbreaker_count_min:
    description: "Agent output dealbreakers list length must be >= this value"
    applies_to_field: "dealbreakers"
    comparison: "gte"

  dealbreakers_must_include_any:
    description: "At least one string in this list must appear (case-insensitive) in any element of the output dealbreakers list"
    applies_to_field: "dealbreakers"
    comparison: "any_substring_match"

  dealbreakers_must_include_all:
    description: "Every string in this list must appear in at least one element of the output dealbreakers list"
    applies_to_field: "dealbreakers"
    comparison: "all_substring_match"

  anomalies_must_include_any:
    description: "At least one string in this list must appear in any element of anomalies_detected"
    applies_to_field: "anomalies_detected"
    comparison: "any_substring_match"

  revenue_cagr_3yr_range:
    description: "revenue_cagr_3yr must fall within [min, max]"
    applies_to_field: "revenue_cagr_3yr"
    comparison: "range_inclusive"

  ebitda_margin_range:
    description: "ebitda_margin must fall within [min, max]"
    applies_to_field: "ebitda_margin"
    comparison: "range_inclusive"

  source_citation_required:
    description: "Every Finding in the findings list must have a non-empty evidence field containing 'http'"
    applies_to_field: "findings[*].evidence"
    comparison: "all_contain_url"

  min_findings_count:
    description: "findings list must contain at least this many items"
    applies_to_field: "findings"
    comparison: "gte_length"

  must_check_ofac:
    description: "Output must reference OFAC or SDN check (string presence in any finding description or corporate_structure_summary)"
    applies_to_field: "corporate_structure_summary"
    comparison: "any_field_contains"
    keywords: ["OFAC", "SDN", "sanctions"]
